<section class="menu-selection">

    <div class="card">
        <h3>Lugaw</h3>
        <img src="IMG/lwe.jpg" width="200" height="200">
        <p>Lugaw w/ egg</p>
        <p>₱75</p>
        <input type="number" min="1" value="1" id="leg">

    <div class="card">

    </div>

    <div class="card">
        <h3>Lugaw</h3>
